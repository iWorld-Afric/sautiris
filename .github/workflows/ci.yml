name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sautiris_test
          POSTGRES_PASSWORD: sautiris_test
          POSTGRES_DB: sautiris_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SAUTIRIS_DATABASE_URL: "postgresql+asyncpg://sautiris_test:sautiris_test@localhost:5432/sautiris_test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Gate 1 — ruff lint
        run: ruff check .

      - name: Gate 2 — ruff format check
        run: ruff format --check .

      - name: Gate 3 — mypy type check
        run: mypy src/

      - name: Gate 4 — pytest with coverage
        run: >
          pytest tests/ -q
          --cov=sautiris
          --cov-report=term-missing
          --cov-fail-under=85

      - name: Gate 5 — bandit security scan
        run: |
          pip install bandit
          bandit -r src/sautiris/ -ll

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
